<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard de Monitoramento</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header class="topo">
        <h1>&gt; monitor<span class="cursor">_</span></h1>
        <p class="subtitulo">Monitoramento de sistema em tempo real</p>
    </header>

    <main>
        <section class="grid-cartoes">
            <div class="card">
                <div class="card-label">CPU</div>
                <div class="valor" id="cpu">--%</div>
                <div class="barra">
                    <div class="barra-preenchida" id="barra-cpu"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-label">MEMÓRIA</div>
                <div class="valor" id="memoria">--%</div>
                <div class="barra">
                    <div class="barra-preenchida" id="barra-memoria"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-label">DISCO</div>
                <div class="valor" id="disco">--%</div>
                <div class="barra">
                    <div class="barra-preenchida" id="barra-disco"></div>
                </div>
            </div>
        </section>

        <section class="painel-grafico">
            <h2>Histórico</h2>
            <canvas id="grafico"></canvas>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
